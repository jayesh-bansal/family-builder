<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#8B5E3C" />
  <title>Kutumb — Offline</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #FFF8F0;
      color: #4A3B3D;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100dvh;
      padding: 1.5rem;
    }
    .container {
      text-align: center;
      max-width: 380px;
    }
    .icon {
      font-size: 3.5rem;
      margin-bottom: 1rem;
    }
    h1 {
      font-size: 1.5rem;
      color: #8B5E3C;
      margin-bottom: 0.5rem;
    }
    p {
      color: #6B5B5D;
      font-size: 0.95rem;
      line-height: 1.5;
      margin-bottom: 1.5rem;
    }
    button {
      background: #8B5E3C;
      color: #fff;
      border: none;
      padding: 0.75rem 2rem;
      border-radius: 0.75rem;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }
    button:hover { background: #A47551; }
    .cached-hint {
      margin-top: 1.5rem;
      font-size: 0.8rem;
      color: #9B8B8E;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">&#127795;</div>
    <h1>You're Offline</h1>
    <p>
      Kutumb needs an internet connection to load new data.
      Your previously viewed tree and profile are saved locally and will be available when you reconnect.
    </p>
    <button onclick="window.location.reload()">Try Again</button>
    <p class="cached-hint">
      Cached pages may still be accessible. Try navigating back.
    </p>
  </div>
</body>
</html>
